apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcgateway
  labels:
    {{- include "mcgateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "mcgateway.name" . }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "mcgateway.labels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
      {{- if or (not .Values.operator.enabled) .Values.metrics.enabled }}
      annotations:
        {{- if not .Values.operator.enabled }}
        # Force pod restart when config changes. Meaningless in
        # operator mode, where config arrives via CRs at runtime.
        checksum/config: {{ .Values.config | sha256sum }}
        {{- end }}
        {{- if .Values.metrics.enabled }}
        # Annotation-based scrape convention; points at the gateway
        # exposition. The operator port (operator mode) is covered by
        # the ServiceMonitor, which handles multiple endpoints.
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        prometheus.io/path: /metrics
        {{- end }}
      {{- end }}
    spec:
      {{- if .Values.operator.enabled }}
      serviceAccountName: mcgateway-operator
      # The API token is mounted into the operator container only (a
      # projected volume below): the gateway container parses
      # untrusted memcache traffic and has no business holding
      # credentials, even read-only ones.
      automountServiceAccountToken: false
      # The operator runs as a native sidecar (initContainer with
      # restartPolicy Always, K8s >= 1.29): kubelet holds the gateway
      # container until the operator's startup probe passes, and that
      # probe is its readiness — first successful commit. The gateway
      # therefore never boots against an empty mount.
      initContainers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          restartPolicy: Always
          args:
            - --dir=/var/run/mcgateway
            - --metrics-addr={{ if .Values.metrics.enabled }}:{{ .Values.metrics.operatorPort }}{{ else }}0{{ end }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: op-metrics
              containerPort: {{ .Values.metrics.operatorPort }}
              protocol: TCP
          {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          startupProbe:
            httpGet:
              path: /readyz
              port: 8081
            periodSeconds: 1
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          volumeMounts:
            - name: state
              mountPath: /var/run/mcgateway
            - name: operator-token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
      {{- else if .Values.gateway.liveReload }}
      # Seed the writable state dir from the ConfigMap and the image's
      # baked-in UDF modules. The gateway then reads (and libmcgateway
      # watches) the seeded copies, so runtime writes to the state dir
      # reload the proxy live — no pod restart.
      initContainers:
        - name: config-seed
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              mkdir -p /var/run/mcgateway/udf
              cp /config-src/config.lua /var/run/mcgateway/config.lua
              cp /etc/mcgateway/udf/*.wasm /var/run/mcgateway/udf/ 2>/dev/null || true
          volumeMounts:
            - name: config
              mountPath: /config-src
            - name: state
              mountPath: /var/run/mcgateway
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: memcache
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: memcache
            periodSeconds: 2
            failureThreshold: 15
          livenessProbe:
            tcpSocket:
              port: memcache
            periodSeconds: 10
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          {{- if or .Values.operator.enabled .Values.gateway.liveReload .Values.metrics.enabled }}
          env:
            {{- if or .Values.operator.enabled .Values.gateway.liveReload }}
            - name: MCGATEWAY_CONFIG
              value: /var/run/mcgateway/config.lua
            - name: MCGW_UDF_DIR
              value: /var/run/mcgateway/udf
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: MCGW_METRICS_ADDR
              value: "0.0.0.0:{{ .Values.metrics.port }}"
            {{- end }}
          {{- end }}
          {{- if or .Values.operator.enabled .Values.gateway.liveReload }}
          volumeMounts:
            # Kept read-write in v1 so fault-injection tests can write
            # config files directly (the fail-safe reload tests). The
            # operator remains the only writer in production; Stage
            # 5's GCS topology makes read-only structural.
            - name: state
              mountPath: /var/run/mcgateway
          {{- else }}
          volumeMounts:
            - name: config
              mountPath: /etc/mcgateway/config.lua
              subPath: config.lua
          {{- end }}
      volumes:
        {{- if not .Values.operator.enabled }}
        - name: config
          configMap:
            name: mcgateway-config
        {{- end }}
        {{- if or .Values.operator.enabled .Values.gateway.liveReload }}
        - name: state
          emptyDir: {}
        {{- end }}
        {{- if .Values.operator.enabled }}
        # Hand-rolled equivalent of the automounted SA volume, scoped
        # to the operator container above.
        - name: operator-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3607
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: mcgateway
  labels:
    {{- include "mcgateway.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "mcgateway.name" . }}
    app.kubernetes.io/component: gateway
  ports:
    - name: memcache
      port: {{ .Values.gateway.port }}
      targetPort: memcache
      protocol: TCP
    {{- if .Values.metrics.enabled }}
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
    {{- if .Values.operator.enabled }}
    # Numeric targetPort: named-port resolution against a (native
    # sidecar) initContainer is version-sensitive; the number is not.
    - name: op-metrics
      port: {{ .Values.metrics.operatorPort }}
      targetPort: {{ .Values.metrics.operatorPort }}
      protocol: TCP
    {{- end }}
    {{- end }}
