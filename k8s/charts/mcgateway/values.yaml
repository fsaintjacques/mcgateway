image:
  repository: mcgateway
  tag: dev
  pullPolicy: IfNotPresent

gateway:
  replicas: 1
  port: 11211
  # Live config reload: an init container seeds the ConfigMap config
  # and the image's baked-in UDF modules into a writable emptyDir; the
  # gateway reads the copies and libmcgateway SIGHUPs the proxy when
  # they change. Writes into the state dir take effect without a pod
  # restart (the ConfigMap remains the seed at pod start). Exercised
  # by the kind suite; Stage 4's operator mode supersedes this.
  liveReload: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

# Backend memcached instances provisioned by this chart for dev/testing.
# In production these come from outside the chart.
backends:
  enabled: true
  image:
    repository: memcached
    tag: "1.6.32-alpine"
    pullPolicy: IfNotPresent
  instances:
    - name: mc-a
    - name: mc-b

# Lua config mounted at /etc/mcgateway/config.lua. Edit to define pools and
# keyspaces. The default wires up mc-a and mc-b backends provisioned above.
config: |
  return {
      pools = {
          { name = "mc-a", addrs = { "mc-a:11211" } },
          { name = "mc-b", addrs = { "mc-b:11211" } },
      },
      keyspaces = {
          -- Stage 1 passthrough (still exercised by existing tests).
          { prefix = "user",    read = "mc-a", write = "mc-a" },
          { prefix = "session", read = "mc-b", write = "mc-b" },

          -- Stage 2 fan-out reads with each built-in merge. Writes go to
          -- both pools (policy defaults to "all") so seed data for the
          -- read tests can be placed directly via the backends.
          { prefix = "fanfh",
            read = { "mc-a", "mc-b" }, write = { "mc-a", "mc-b" },
            merge = "first-hit" },
          { prefix = "fanpp",
            read = { "mc-a", "mc-b" }, write = { "mc-a", "mc-b" },
            merge = "pool-preferred" },
          { prefix = "fanlww",
            read = { "mc-a", "mc-b" }, write = { "mc-a", "mc-b" },
            merge = "last-write-wins" },

          -- Write-policy exercisers. `wall` requires both pools to ack;
          -- `wfirst` acks on the primary and shadows to the secondary.
          { prefix = "wall",
            read = { "mc-a", "mc-b" }, write = { "mc-a", "mc-b" },
            write_policy = "all",   merge = "first-hit" },
          { prefix = "wfirst",
            read = { "mc-a", "mc-b" }, write = { "mc-a", "mc-b" },
            write_policy = "first", merge = "first-hit" },

          -- Stage 3b WASM merge. `merge_profile_proto` is the file
          -- stem of /etc/mcgateway/udf/merge_profile_proto.wasm, the
          -- prost-based UDF that decodes a Profile protobuf from each
          -- pool and returns the merged bytes.
          { prefix = "profile",
            read = { "mc-a", "mc-b" }, write = { "mc-a", "mc-b" },
            merge = "merge_profile_proto" },
      },
  }
