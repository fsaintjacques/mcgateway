image:
  repository: mcgateway
  tag: dev
  pullPolicy: IfNotPresent

gateway:
  replicas: 1
  port: 11211
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

# Backend memcached instances provisioned by this chart for dev/testing.
# In production these come from outside the chart.
backends:
  enabled: true
  image:
    repository: memcached
    tag: "1.6.32-alpine"
    pullPolicy: IfNotPresent
  instances:
    - name: mc-a
    - name: mc-b

# Lua config mounted at /etc/mcgateway/config.lua. Edit to define pools and
# keyspaces. The default wires up mc-a and mc-b backends provisioned above.
config: |
  return {
      pools = {
          { name = "mc-a", addrs = { "mc-a:11211" } },
          { name = "mc-b", addrs = { "mc-b:11211" } },
      },
      keyspaces = {
          { prefix = "user",    read = "mc-a", write = "mc-a" },
          { prefix = "session", read = "mc-b", write = "mc-b" },
      },
  }
