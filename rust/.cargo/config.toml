# mlua's `module` feature builds a cdylib that expects the Lua runtime to
# resolve its symbols at load time (the gateway's memcached binary embeds
# Lua and will dlopen us). macOS needs explicit permission for undefined
# symbols; Linux permits it by default.

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

# musl defaults to static CRT, which bans cdylib. The gateway dlopens our
# .so at runtime, so we need a dynamically-linkable artifact.
[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static"]
